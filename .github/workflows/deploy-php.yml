name: Deploy fitness buddy PHP endpoints

on:
  push:
    branches: [main]
    paths:
      - 'php/*.php'
      - '.github/workflows/deploy-php.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject DB credentials into all PHP files
        run: |
          for file in php/*.php; do
            sed -i "s|%%DB_HOST%%|${{ secrets.DB_HOST }}|g" "$file"
            sed -i "s|%%DB_NAME%%|${{ secrets.DB_NAME }}|g" "$file"
            sed -i "s|%%DB_USER%%|${{ secrets.DB_USER }}|g" "$file"
            sed -i "s|%%DB_PASS%%|${{ secrets.DB_PASS }}|g" "$file"
          done

      - name: Create Gemini config
        run: |
          cat <<'PHP' > php/config.local.php
          <?php
          define('GEMINI_API_KEY', '${{ secrets.GEMINI_API_KEY }}');
          PHP

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to site root via SFTP
        run: |
          sshpass -p "${{ secrets.SFTP_PASS }}" sftp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P ${{ secrets.SFTP_PORT }} \
            "${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}" <<'SFTP'
          put php/illustrations.php illustrations.php
          put php/regenerate.php regenerate.php
          put php/fb_auth_check.php fb_auth_check.php
          put php/models.php models.php
          put php/config.local.php config.local.php
          SFTP

      - name: Done
        run: echo "✅ PHP endpoints deployed to labanos.dk root"
